<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Penny  Intro Animation Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #F7F7F2;
    color: #242321;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ───── Intro overlay ───── */
  .intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #F7F7F2;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: overlayFadeOut 0.6s cubic-bezier(0.65, 0, 0.35, 1) 2.4s forwards;
  }

  .intro-lockup {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  /* Loop mark  draws then fills */
  .intro-mark {
    width: 140px;
    height: 140px;
    overflow: visible;
  }

  .mark-outline {
    fill: none;
    stroke: #C98160;
    stroke-width: 14;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 3500;
    stroke-dashoffset: 3500;
    animation: drawLoop 1.4s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
  }

  .mark-fill {
    fill: #C98160;
    opacity: 0;
    animation: fillIn 0.5s ease-out 1.25s forwards;
  }

  @keyframes drawLoop {
    to { stroke-dashoffset: 0; }
  }

  @keyframes fillIn {
    to { opacity: 1; }
  }

  /* Wordmark */
  .intro-wordmark {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #242321;
    display: flex;
  }

  .intro-wordmark span {
    opacity: 0;
    transform: translateY(16px);
    animation: letterEnter 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    display: inline-block;
  }

  .intro-wordmark span:nth-child(1) { animation-delay: 0.85s; }
  .intro-wordmark span:nth-child(2) { animation-delay: 0.93s; }
  .intro-wordmark span:nth-child(3) { animation-delay: 1.01s; }
  .intro-wordmark span:nth-child(4) { animation-delay: 1.09s; }
  .intro-wordmark span:nth-child(5) { animation-delay: 1.17s; }

  @keyframes letterEnter {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes overlayFadeOut {
    to { opacity: 0; visibility: hidden; pointer-events: none; }
  }

  /* ───── Mock landing page ───── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    opacity: 0;
    animation: pageEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.9s forwards;
  }

  @keyframes pageEnter {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-logo {
    position: absolute;
    top: 32px;
    left: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .nav-logo svg { width: 32px; height: 32px; overflow: visible; }

  .hero h1 {
    font-size: clamp(40px, 7vw, 80px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.05;
    text-align: center;
    max-width: 900px;
    margin-bottom: 24px;
  }

  .hero h1 em {
    font-style: normal;
    color: #C98160;
  }

  .hero p {
    font-size: 20px;
    color: #4a4a47;
    text-align: center;
    max-width: 560px;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .cta-group {
    display: flex;
    gap: 12px;
  }

  .btn {
    padding: 14px 24px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    font-family: inherit;
  }

  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: #242321; color: #F7F7F2; }
  .btn-secondary { background: transparent; color: #242321; border: 1px solid #d4d4cf; }

  /* ───── Replay control ───── */
  .replay {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    padding: 12px 18px;
    background: #242321;
    color: #F7F7F2;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    opacity: 0;
    animation: pageEnter 0.6s ease 3.4s forwards;
  }

  .replay:hover { background: #000; }

  /* Shared path data via symbol */
</style>
</head>

  <!-- ───── MOCK LANDING PAGE ───── -->
  <div class="nav-logo">
    <svg viewBox="270 830 330 420" xmlns="http://www.w3.org/2000/svg">
      <use href="#penny-mark" fill="#C98160"/>
    </svg>
    penny
  </div>

  <section class="hero">
    <h1>Phone calls, <em>handled.</em></h1>
    <p>Penny answers, calls back, and gets things done  so you don't have to pick up the phone.</p>
    <div class="cta-group">
      <button class="btn btn-primary">Hear Penny in action</button>
      <button class="btn btn-secondary">See features</button>
    </div>
  </section>

  <button class="replay" id="replay">↻ Replay intro</button>

<script>
  const intro = document.getElementById('intro');
  const replay = document.getElementById('replay');

  replay.addEventListener('click', () => {
    // Clone and replace to fully reset animations
    const fresh = intro.cloneNode(true);
    intro.parentNode.replaceChild(fresh, intro);
    fresh.style.animation = '';

    // Re-bind reference for future replays
    window.__intro = fresh;
  });
</script>

</body>
